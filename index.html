<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZYSMOKE: MINIMAL CRM</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0a1b 0%, #120e24 100%);
            --card-bg: rgba(25, 20, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent: #ff9800;
            --accent-gradient: linear-gradient(45deg, #ff9800, #ff5722);
            --liquid-color: #00b4db;
            --cartridge-color: #ec008c;
            --success: #38ef7d;
            --danger: #ff416c;
            --text: #ffffff;
            --text-muted: #8e8a9f;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 12px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 1200px; margin: 0 auto; display: none; }
        #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 85vh; }
        
        .auth-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 30px 20px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center;
        }
        .auth-card h2 { margin: 0 0 20px 0; font-weight: 800; letter-spacing: 1px; color: var(--text); }

        header { text-align: center; margin-bottom: 20px; position: relative; padding: 10px 0; }
        header h1 { margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
        header p { margin: 4px 0 0 0; color: var(--accent); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }

        .btn-logout {
            position: absolute; right: 0; top: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }

        .box {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 14px; padding: 16px; margin-bottom: 15px;
        }

        .profit-box { text-align: center; padding: 20px 10px; }
        .profit-box h3 { margin: 0; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .profit-amount { font-size: 2.4rem; font-weight: 900; color: var(--success); margin-top: 5px; }

        h2 { margin-top: 0; font-size: 1.1rem; font-weight: 700; padding-bottom: 8px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .form-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-inline .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

        input, select {
            width: 100%; padding: 10px; background: rgba(10, 8, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08); color: white; border-radius: 8px; font-size: 0.9rem; height: 42px;
        }
        input:focus, select:focus { border-color: var(--accent); outline: none; }

        .btn {
            background: var(--accent-gradient); color: white; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; font-size: 0.85rem; height: 42px; text-transform: uppercase; letter-spacing: 0.5px; width: 100%;
        }
        .btn-promo { background: #11998e; }
        .btn-cancel-promo { background: rgba(255, 255, 255, 0.05); color: var(--danger); border: 1px solid rgba(255,65,108,0.2); }

        /* ТАБЛИЦІ ДЛЯ ПК */
        .table-wrapper { display: block; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; display: table; }
        th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; padding: 10px; font-weight: 600; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }

        .counter-btn {
            background: #1c1733; color: white; border: 1px solid rgba(255,255,255,0.08);
            width: 36px; height: 36px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-delete { background: rgba(255, 65, 108, 0.1); color: var(--danger); border: 1px solid rgba(255, 65, 108, 0.15); padding: 5px 9px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .badge-active { background: var(--success); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .checkbox-cell { width: 30px; text-align: center; }
        .checkbox-cell input { transform: scale(1.1); accent-color: var(--accent); }

        .title-liquid { color: var(--liquid-color); }
        .title-cartridge { color: var(--cartridge-color); }

        /* 📱 МОБІЛЬНИЙ АДАПТИВ (КАРТКИ ЗАМІСТЬ ТАБЛИЦЬ) */
        @media (max-width: 768px) {
            header h1 { font-size: 1.5rem; }
            .btn-logout { position: static; display: block; margin: 10px auto 0 auto; width: 80px; padding: 4px; }
            
            /* Ховаємо класичну таблицю */
            table thead { display: none; }
            table, table tbody, table tr, table td { display: block; width: 100%; padding: 0; border: none; }
            
            /* Перетворюємо рядок на красиву картку товару */
            table tr {
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.04);
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 10px;
                display: grid;
                grid-template-columns: auto 1fr auto;
                grid-template-areas: 
                    "check name delete"
                    "info actions actions"
                    "promo profit profit";
                align-items: center;
                gap: 8px;
            }

            table tr td:nth-child(1) { grid-area: check; width: auto; } /* Чекбокс */
            table tr td:nth-child(2) { grid-area: name; font-size: 1rem; font-weight: 700; } /* Назва */
            table tr td:nth-child(9) { grid-area: delete; text-align: right; } /* Видалення (Х) */
            
            /* Блок інфо (Закупка, Ціна, Залишок) */
            table tr td:nth-child(3), table tr td:nth-child(4), table tr td:nth-child(5) { display: none; } 
            .mobile-info-block {
                grid-area: info;
                display: flex;
                flex-direction: column;
                gap: 2px;
                font-size: 0.8rem;
                color: var(--text-muted);
            }
            .mobile-info-block b { color: var(--text); }

            /* Блок продажу (+ / -) */
            table tr td:nth-child(6) { 
                grid-area: actions; 
                display: flex; 
                align-items: center; 
                justify-content: flex-end; 
                gap: 10px;
            }

            table tr td:nth-child(7) { grid-area: promo; font-size: 0.8rem; } /* Акція */
            table tr td:nth-child(8) { grid-area: profit; text-align: right; font-size: 0.9rem; font-weight: bold; } /* Прибуток */
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2>IZYSMOKE CRM</h2>
        <form id="auth-form">
            <input type="text" id="username-input" placeholder="Логін" required style="margin-bottom: 10px; padding-left: 10px;">
            <input type="password" id="password-input" placeholder="Пароль" required style="margin-bottom: 15px; padding-left: 10px;">
            <button type="submit" class="btn">Увійти</button>
        </form>
        <p id="auth-error" style="color: var(--danger); font-size: 0.8rem; margin-top: 10px; display: none;">❌ Невірний логін або пароль</p>
    </div>
</div>

<div class="container" id="main-container">
    <header>
        <h1>IZYSMOKE</h1>
        <p>Панель обліку</p>
        <button class="btn-logout" onclick="logout()">Вийти</button>
    </header>

    <div class="box profit-box">
        <h3>Чистий прибуток</h3>
        <div class="profit-amount"><span id="total-profit">0</span> ₴</div>
    </div>

    <!-- Додавання товару -->
    <div class="box">
        <h2>✚ Новий товар</h2>
        <form id="p-form" class="form-inline">
            <div class="form-group">
                <label>Категорія</label>
                <select id="category">
                    <option value="liquid">Рідина</option>
                    <option value="cartridge">Картридж</option>
                </select>
            </div>
            <div class="form-group">
                <label>Назва / Смак</label>
                <input type="text" id="name" placeholder="Назва" required>
            </div>
            <div class="form-group">
                <label>К-сть (шт)</label>
                <input type="number" id="qty" value="10" min="1" required>
            </div>
            <div class="form-group">
                <label>Закупка 1шт</label>
                <input type="number" id="cost" placeholder="₴" required>
            </div>
            <div class="form-group full-width">
                <label>Ціна продажу</label>
                <input type="number" id="price" placeholder="₴" required>
            </div>
            <div class="full-width" style="margin-top: 5px;">
                <button type="submit" class="btn">Додати</button>
            </div>
        </form>
    </div>

    <!-- Управління Акціями -->
    <div class="box">
        <h2>⚡ Масова Акція</h2>
        <div class="form-inline">
            <div class="form-group">
                <label>Ціна по акції</label>
                <input type="number" id="mass-promo-price" placeholder="₴">
            </div>
            <div class="form-group">
                <label>З якого числа</label>
                <input type="date" id="mass-promo-start">
            </div>
            <div class="form-group full-width">
                <label>По яке число</label>
                <input type="date" id="mass-promo-end">
            </div>
            <div style="margin-top: 5px;">
                <button type="button" class="btn btn-promo" onclick="applyMassPromo()">Старт</button>
            </div>
            <div style="margin-top: 5px;">
                <button type="button" class="btn btn-cancel-promo" onclick="cancelMassPromo()">Скинуть</button>
            </div>
        </div>
    </div>

    <!-- РІДИНИ -->
    <div class="box">
        <h2><span class="title-liquid">💧 Рідини</span></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" onclick="toggleAll('liquid', this)"></th>
                        <th>Смак</th>
                        <th>Закупка</th>
                        <th>Ціна</th>
                        <th>Залишок</th>
                        <th>Продати</th>
                        <th>Акція</th>
                        <th>Прибуток</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="liquid-list"></tbody>
            </table>
        </div>
    </div>

    <!-- КАРТРИДЖІ -->
    <div class="box">
        <h2><span class="title-cartridge">🔋 Картриджі</span></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" onclick="toggleAll('cartridge', this)"></th>
                        <th>Модель</th>
                        <th>Закупка</th>
                        <th>Ціна</th>
                        <th>Залишок</th>
                        <th>Продати</th>
                        <th>Акція</th>
                        <th>Прибуток</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="cartridge-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SECRET_USERNAME = 'izysmoke';
    const SECRET_PASSWORD = '1111';

    document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        if (document.getElementById('username-input').value.trim() === SECRET_USERNAME && 
            document.getElementById('password-input').value === SECRET_PASSWORD) {
            sessionStorage.setItem('izysmoke_auth', 'true');
            showMainSystem();
        } else {
            document.getElementById('auth-error').style.display = 'block';
        }
    });

    function checkAuth() {
        if (sessionStorage.getItem('izysmoke_auth') === 'true') showMainSystem();
    }

    function showMainSystem() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        render();
    }

    window.logout = function() {
        sessionStorage.removeItem('izysmoke_auth');
        window.location.reload();
    }

    let db = JSON.parse(localStorage.getItem('izismoke_v7_db')) || [];

    function isPromo(start, end) {
        if (!start || !end) return false;
        const today = new Date().setHours(0,0,0,0);
        return today >= new Date(start).setHours(0,0,0,0) && today <= new Date(end).setHours(0,0,0,0);
    }

    function render() {
        if (sessionStorage.getItem('izysmoke_auth') !== 'true') return;

        const liquidList = document.getElementById('liquid-list');
        const cartridgeList = document.getElementById('cartridge-list');
        liquidList.innerHTML = '';
        cartridgeList.innerHTML = '';
        let totalProfit = 0;

        db.forEach((item, index) => {
            const active = isPromo(item.pStart, item.pEnd);
            const currentPrice = (active && item.pPrice) ? Number(item.pPrice) : Number(item.price);
            const left = item.qty - item.sold;
            totalProfit += item.profit;

            let promoHTML = '<span style="color:var(--text-muted)">—</span>';
            if (item.pPrice) {
                promoHTML = active ? `<span class="badge-active">% ${item.pPrice}₴</span>` : `<span style="color:var(--text-muted); font-size:0.75rem;">Скоро</span>`;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" class="select-item ${item.category}" data-index="${index}"></td>
                <td><span style="font-weight:600;">${item.name}</span></td>
                
                <!-- Для ПК версії -->
                <td>${item.cost} ₴</td>
                <td>${currentPrice} ₴</td>
                <td>${left} / ${item.qty} шт</td>
                
                <!-- Адаптивний блок для мобілок (ховається на ПК) -->
                <div class="mobile-info-block">
                    <span>Залишок: <b>${left} шт</b> з ${item.qty}</span>
                    <span>Ціна: <b style="color:var(--accent)">${currentPrice} ₴</b> | Зак: ${item.cost} ₴</span>
                </div>

                <td>
                    <button class="counter-btn" type="button" onclick="sell(${index}, -1)">-</button>
                    <span style="font-size:1.1rem; font-weight:700; margin:0 5px; display:inline-block; min-width:20px; text-align:center;">${item.sold}</span>
                    <button class="counter-btn" type="button" onclick="sell(${index}, 1)">+</button>
                </td>
                <td>${promoHTML}</td>
                <td style="color:var(--success); font-weight:700;">${item.profit} ₴</td>
                <td><button type="button" onclick="remove(${index})" class="btn-delete">✕</button></td>
            `;

            if (item.category === 'liquid') {
                liquidList.appendChild(tr);
            } else {
                cartridgeList.appendChild(tr);
            }
        });

        document.getElementById('total-profit').innerText = totalProfit.toLocaleString('uk-UA');
    }

    document.getElementById('p-form').addEventListener('submit', function(e) {
        e.preventDefault();
        db.push({
            category: document.getElementById('category').value,
            name: document.getElementById('name').value,
            qty: Number(document.getElementById('qty').value),
            cost: Number(document.getElementById('cost').value),
            price: Number(document.getElementById('price').value),
            sold: 0, profit: 0, history: [], pPrice: null, pStart: null, pEnd: null
        });
        save();
        document.getElementById('name').value = '';
    });

    window.sell = function(index, dir) {
        const item = db[index];
        const active = isPromo(item.pStart, item.pEnd);
        const currentPrice = (active && item.pPrice) ? Number(item.pPrice) : Number(item.price);
        const currentMargin = currentPrice - item.cost;

        if (dir === 1) {
            if (item.sold >= item.qty) return alert("Товар закінчився!");
            item.sold += 1; item.profit += currentMargin; item.history.push(currentMargin);
        } else {
            if (item.sold <= 0) return;
            const lastMargin = item.history.pop();
            item.sold -= 1; item.profit -= lastMargin;
        }
        save();
    }

    window.applyMassPromo = function() {
        const pPrice = document.getElementById('mass-promo-price').value;
        const pStart = document.getElementById('mass-promo-start').value;
        const pEnd = document.getElementById('mass-promo-end').value;

        if (!pPrice || !pStart || !pEnd) return alert("Заповніть акцію повністю!");
        const checkboxes = document.querySelectorAll('.select-item:checked');
        if (checkboxes.length === 0) return alert("Виберіть товари галочкою!");

        checkboxes.forEach(cb => {
            const index = cb.getAttribute('data-index');
            db[index].pPrice = Number(pPrice); db[index].pStart = pStart; db[index].pEnd = pEnd;
        });
        clearPromoForm(); save();
    }

    window.cancelMassPromo = function() {
        const checkboxes = document.querySelectorAll('.select-item:checked');
        if (checkboxes.length === 0) return alert("Виберіть товари галочкою!");
        checkboxes.forEach(cb => {
            const index = cb.getAttribute('data-index');
            db[index].pPrice = null; db[index].pStart = null; db[index].pEnd = null;
        });
        clearPromoForm(); save();
    }

    function clearPromoForm() {
        document.getElementById('mass-promo-price').value = '';
        document.getElementById('mass-promo-start').value = '';
        document.getElementById('mass-promo-end').value = '';
        document.querySelectorAll('.select-item').forEach(cb => cb.checked = false);
        document.querySelectorAll('thead input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    window.toggleAll = function(cat, masterCb) {
        document.querySelectorAll(`.select-item.${cat}`).forEach(cb => cb.checked = masterCb.checked);
    }

    window.remove = function(index) {
        if(confirm(`Видалити цей товар зі складу?`)) { db.splice(index, 1); save(); }
    }

    function save() { localStorage.setItem('izismoke_v7_db', JSON.stringify(db)); render(); }
    
    checkAuth();
</script>
</body>
</html>
