<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZYSMOKE: ADVANCED CRM</title>
    <style>
        :root {
            --bg: #0b0914;
            --card-bg: rgba(22, 18, 38, 0.7);
            --border: rgba(255, 255, 255, 0.04);
            --accent: #ff9800;
            --liquid: #00b4db;
            --cartridge: #ec008c;
            --success: #38ef7d;
            --danger: #ff416c;
            --text: #ffffff;
            --text-muted: #7e7a8f;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; display: none; }
        
        #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .auth-card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px 20px; border-radius: 12px; width: 100%; max-width: 340px; text-align: center; }
        
        header { text-align: center; margin-bottom: 15px; position: relative; }
        header h1 { margin: 0; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
        header p { margin: 2px 0 0 0; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; }
        .btn-logout { position: absolute; right: 0; top: 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

        .box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .profit-box { text-align: center; padding: 15px; }
        .profit-box h3 { margin: 0; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .profit-amount { font-size: 2.2rem; font-weight: 900; color: var(--success); margin-top: 3px; }

        .box-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 6px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
        h2 { margin: 0; font-size: 1rem; font-weight: 700; }
        .count-badge { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; }

        .form-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .form-inline .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 3px; }
        .form-group label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }

        input, select { width: 100%; padding: 8px; background: #05040a; border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 0.85rem; height: 38px; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .btn { background: linear-gradient(45deg, #ff9800, #ff5722); color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 0.8rem; height: 38px; text-transform: uppercase; cursor: pointer; width: 100%; }
        .btn-sm { height: 28px; padding: 0 12px; font-size: 0.7rem; width: auto; }
        .btn-promo { background: #11998e; }
        .btn-select-mode { background: #3f51b5; }
        .btn-select-mode.active { background: #e91e63; }
        .btn-cancel-promo { background: transparent; color: var(--danger); border: 1px solid rgba(255,65,108,0.2); }
        .btn-danger-mode { background: #2c1424; border: 1px solid rgba(255,65,108,0.2); color: var(--danger); margin-top: 5px; }
        .btn-danger-mode.active { background: var(--danger); color: white; }

        /* ТАБЛИЦІ */
        .table-wrapper { display: block; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }
        
        .btn-delete { background: transparent; color: var(--danger); border: none; cursor: pointer; font-size: 1rem; font-weight: bold; padding: 5px; display: none; }
        .badge-active { background: var(--success); color: #000; padding: 1px 4px; border-radius: 3px; font-size: 0.65rem; font-weight: 700; }
        
        /* Чекбокси приховані за замовчуванням */
        .checkbox-cell { width: 30px; display: none; text-align: center; }
        .checkbox-cell input { transform: scale(1.2); accent-color: var(--accent); margin: 0; cursor: pointer; }
        
        /* Показуємо чекбокси або видалення при активації режимів */
        body.select-mode-on .checkbox-cell { display: table-cell; }
        body.delete-mode-on .btn-delete { display: inline-block; }

        .counter-btn { background: #18142c; color: white; border: 1px solid var(--border); width: 32px; height: 32px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }

        .title-liquid { color: var(--liquid); }
        .title-cartridge { color: var(--cartridge); }

        /* 📱 АДАПТИВНИЙ ДИЗАЙН */
        @media (max-width: 768px) {
            header h1 { font-size: 1.3rem; }
            .btn-logout { position: static; display: block; margin: 8px auto 0 auto; height: 26px; padding: 4px 10px; }
            
            table thead { display: none; }
            table, table tbody, table tr, table td { display: block; width: 100%; }
            
            table tr {
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.01);
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                padding: 10px 4px;
            }

            /* Ховаємо ПК стовпчики */
            table tr td:nth-child(3), 
            table tr td:nth-child(4), 
            table tr td:nth-child(5),
            table tr td:nth-child(7) { display: none; }

            /* Чекбокс у мобільному флексі */
            table tr td:nth-child(1) {
                display: none; 
                width: 35px;
                flex-shrink: 0;
            }
            body.select-mode-on table tr td:nth-child(1) { display: flex; align-items: center; justify-content: center; }

            /* Блок назви та інфо */
            table tr td:nth-child(2) {
                display: flex;
                flex-direction: column;
                justify-content: center;
                flex: 1;
                padding-right: 6px;
                min-width: 0;
            }
            table tr td:nth-child(2) .m-name { font-size: 0.9rem; font-weight: 700; color: #fff; line-height: 1.2; }
            table tr td:nth-child(2) .m-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; line-height: 1.1; }

            /* Кнопки продажу */
            table tr td:nth-child(6) {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 95px;
                flex-shrink: 0;
            }
            
            /* Прибуток */
            table tr td:nth-child(8) {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                width: 60px;
                flex-shrink: 0;
                font-size: 0.85rem;
                font-weight: 700;
                color: var(--success);
            }

            /* Кнопка видалення в кінці рядка */
            table tr td:nth-child(9) {
                width: auto;
                flex-shrink: 0;
                display: none;
                padding-left: 5px;
            }
            body.delete-mode-on table tr td:nth-child(9) { display: flex; align-items: center; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="margin:0 0 15px 0; font-size:1.2rem;">IZYSMOKE CRM</h2>
        <form id="auth-form">
            <input type="text" id="username-input" placeholder="Логін" required style="margin-bottom: 8px; padding-left: 8px;">
            <input type="password" id="password-input" placeholder="Пароль" required style="margin-bottom: 12px; padding-left: 8px;">
            <button type="submit" class="btn">Увійти</button>
        </form>
        <p id="auth-error" style="color: var(--danger); font-size: 0.75rem; margin-top: 8px; display: none;">❌ Помилка входу</p>
    </div>
</div>

<div class="container" id="main-container">
    <header>
        <h1>IZYSMOKE</h1>
        <p>Мінімалістичний облік</p>
        <button class="btn-logout" onclick="logout()">Вийти</button>
    </header>

    <div class="box profit-box">
        <h3>Чистий прибуток</h3>
        <div class="profit-amount"><span id="total-profit">0</span> ₴</div>
    </div>

    <!-- ДОДАВАННЯ НА СКЛАД -->
    <div class="box">
        <div class="box-header"><h2>✚ Додати на склад</h2></div>
        <form id="p-form" class="form-inline">
            <div class="form-group">
                <label>Категорія</label>
                <select id="category">
                    <option value="liquid">💧 Рідина</option>
                    <option value="cartridge">🔋 Картридж</option>
                </select>
            </div>
            <div class="form-group">
                <label>Назва / Смак</label>
                <input type="text" id="name" placeholder="Назва" required>
            </div>
            <div class="form-group">
                <label>К-сть (шт)</label>
                <input type="number" id="qty" value="10" min="1" required>
            </div>
            <div class="form-group">
                <label>Закупка 1шт</label>
                <input type="number" id="cost" placeholder="₴" required>
            </div>
            <div class="form-group full-width">
                <label>Ціна продажу</label>
                <input type="number" id="price" placeholder="₴" required>
            </div>
            <div class="full-width" style="margin-top: 3px;">
                <button type="submit" class="btn">Додати</button>
            </div>
        </form>
    </div>

    <!-- МАСОВІ АКЦІЇ -->
    <div class="box">
        <div class="box-header">
            <h2>⚡ Масова Акція</h2>
            <button type="button" id="select-mode-btn" class="btn btn-sm btn-select-mode" onclick="toggleSelectMode()">Вибрати товари</button>
        </div>
        <div class="form-inline">
            <div class="form-group"><label>Ціна на акції</label><input type="number" id="mass-promo-price" placeholder="₴"></div>
            <div class="form-group"><label>З числа</label><input type="date" id="mass-promo-start"></div>
            <div class="form-group full-width"><label>По яке число</label><input type="date" id="mass-promo-end"></div>
            <div style="margin-top: 2px;"><button type="button" class="btn btn-promo" onclick="applyMassPromo()">Запустити Акцію</button></div>
            <div style="margin-top: 2px;"><button type="button" class="btn btn-cancel-promo" onclick="cancelMassPromo()">Скинути Акцію</button></div>
        </div>
    </div>

    <!-- РІДИНИ -->
    <div class="box">
        <div class="box-header">
            <h2><span class="title-liquid">💧 Рідини</span></h2>
            <div class="count-badge" id="liquid-total-count">Всього: 0 шт</div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" onclick="toggleAll('liquid', this)"></th>
                        <th>Смак</th>
                        <th>Закупка</th>
                        <th>Ціна</th>
                        <th>Залишок</th>
                        <th>Продати</th>
                        <th>Акція</th>
                        <th>Прибуток</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="liquid-list"></tbody>
            </table>
        </div>
    </div>

    <!-- КАРТРИДЖІ -->
    <div class="box">
        <div class="box-header">
            <h2><span class="title-cartridge">🔋 Картриджі</span></h2>
            <div class="count-badge" id="cartridge-total-count">Всього: 0 шт</div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" onclick="toggleAll('cartridge', this)"></th>
                        <th>Модель</th>
                        <th>Закупка</th>
                        <th>Ціна</th>
                        <th>Залишок</th>
                        <th>Продати</th>
                        <th>Акція</th>
                        <th>Прибуток</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartridge-list"></tbody>
            </table>
        </div>
    </div>

    <!-- РЕЖИМ ВИДАЛЕННЯ -->
    <button type="button" id="delete-mode-btn" class="btn btn-danger-mode" onclick="toggleDeleteMode()">⚙️ Режим видалення товарів</button>
</div>

<script>
    const SECRET_USERNAME = 'izysmoke';
    const SECRET_PASSWORD = '1111';

    document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        if (document.getElementById('username-input').value.trim() === SECRET_USERNAME && 
            document.getElementById('password-input').value === SECRET_PASSWORD) {
            sessionStorage.setItem('izysmoke_auth', 'true');
            showMainSystem();
        } else {
            document.getElementById('auth-error').style.display = 'block';
        }
    });

    function checkAuth() { if (sessionStorage.getItem('izysmoke_auth') === 'true') showMainSystem(); }
    function showMainSystem() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-container').style.display = 'block'; render(); }
    window.logout = function() { sessionStorage.removeItem('izysmoke_auth'); window.location.reload(); }

    let db = JSON.parse(localStorage.getItem('izismoke_v7_db')) || [];

    function isPromo(start, end) {
        if (!start || !end) return false;
        const today = new Date().setHours(0,0,0,0);
        return today >= new Date(start).setHours(0,0,0,0) && today <= new Date(end).setHours(0,0,0,0);
    }

    // Перемикання режиму вибору акцій (показ чекбоксів)
    window.toggleSelectMode = function() {
        const body = document.body;
        const btn = document.getElementById('select-mode-btn');
        if (body.classList.contains('select-mode-on')) {
            body.classList.remove('select-mode-on');
            btn.innerText = 'Вибрати товари';
            btn.classList.remove('active');
        } else {
            body.classList.add('select-mode-on');
            body.classList.remove('delete-mode-on'); // вимикаємо видалення якщо було активне
            document.getElementById('delete-mode-btn').classList.remove('active');
            btn.innerText = 'Скасувати вибір';
            btn.classList.add('active');
        }
    }

    // Перемикання режиму безпечного видалення (показ хрестиків)
    window.toggleDeleteMode = function() {
        const body = document.body;
        const btn = document.getElementById('delete-mode-btn');
        if (body.classList.contains('delete-mode-on')) {
            body.classList.remove('delete-mode-on');
            btn.classList.remove('active');
        } else {
            body.classList.add('delete-mode-on');
            body.classList.remove('select-mode-on'); // вимикаємо акції якщо були активні
            document.getElementById('select-mode-btn').innerText = 'Вибрати товари';
            document.getElementById('select-mode-btn').classList.remove('active');
            btn.classList.add('active');
        }
    }

    function render() {
        if (sessionStorage.getItem('izysmoke_auth') !== 'true') return;

        const liquidList = document.getElementById('liquid-list');
        const cartridgeList = document.getElementById('cartridge-list');
        liquidList.innerHTML = ''; cartridgeList.innerHTML = '';
        
        let totalProfit = 0;
        let totalLiquidsQty = 0;
        let totalCartridgesQty = 0;

        db.forEach((item, index) => {
            const active = isPromo(item.pStart, item.pEnd);
            const currentPrice = (active && item.pPrice) ? Number(item.pPrice) : Number(item.price);
            const left = item.qty - item.sold;
            totalProfit += item.profit;

            if (item.category === 'liquid') {
                totalLiquidsQty += left;
            } else {
                totalCartridgesQty += left;
            }

            let promoHTML = '<span style="color:var(--text-muted)">—</span>';
            if (item.pPrice) promoHTML = active ? `<span class="badge-active">% ${item.pPrice}₴</span>` : ``;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" class="select-item ${item.category}" data-index="${index}"></td>
                
                <td>
                    <span class="m-name">${item.name}</span>
                    <span class="m-sub">Ціна: <b>${currentPrice}₴</b> | Зал: <b>${left}/${item.qty}шт</b></span>
                </td>
                
                <td>${item.cost} ₴</td>
                <td>${currentPrice} ₴</td>
                <td>${left} / ${item.qty} шт</td>
                
                <td>
                    <button class="counter-btn" type="button" onclick="sell(${index}, -1)">-</button>
                    <span style="font-size:1rem; font-weight:700; margin:0 6px; display:inline-block; min-width:16px; text-align:center;">${item.sold}</span>
                    <button class="counter-btn" type="button" onclick="sell(${index}, 1)">+</button>
                </td>
                
                <td>${promoHTML}</td>
                <td>${item.profit} ₴</td>
                <td><button type="button" onclick="remove(${index})" class="btn-delete">✕</button></td>
            `;

            if (item.category === 'liquid') { liquidList.appendChild(tr); } else { cartridgeList.appendChild(tr); }
        });

        document.getElementById('total-profit').innerText = totalProfit.toLocaleString('uk-UA');
        document.getElementById('liquid-total-count').innerText = `Всього: ${totalLiquidsQty} шт`;
        document.getElementById('cartridge-total-count').innerText = `Всього: ${totalCartridgesQty} шт`;
    }

    document.getElementById('p-form').addEventListener('submit', function(e) {
        e.preventDefault();
        db.push({
            category: document.getElementById('category').value,
            name: document.getElementById('name').value,
            qty: Number(document.getElementById('qty').value),
            cost: Number(document.getElementById('cost').value),
            price: Number(document.getElementById('price').value),
            sold: 0, profit: 0, history: [], pPrice: null, pStart: null, pEnd: null
        });
        save(); document.getElementById('name').value = '';
    });

    window.sell = function(index, dir) {
        const item = db[index];
        const active = isPromo(item.pStart, item.pEnd);
        const currentPrice = (active && item.pPrice) ? Number(item.pPrice) : Number(item.price);
        const currentMargin = currentPrice - item.cost;

        if (dir === 1) {
            if (item.sold >= item.qty) return alert("Закінчився товар!");
            item.sold += 1; item.profit += currentMargin; item.history.push(currentMargin);
        } else {
            if (item.sold <= 0) return;
            const lastMargin = item.history.pop();
            item.sold -= 1; item.profit -= lastMargin;
        }
        save();
    }

    window.applyMassPromo = function() {
        const pPrice = document.getElementById('mass-promo-price').value;
        const pStart = document.getElementById('mass-promo-start').value;
        const pEnd = document.getElementById('mass-promo-end').value;
        if (!pPrice || !pStart || !pEnd) return alert("Заповніть поля акції!");
        
        const checkboxes = document.querySelectorAll('.select-item:checked');
        if (checkboxes.length === 0) return alert("Спочатку натисніть 'Вибрати товари' та позначте галочками потрібні позиції!");
        
        checkboxes.forEach(cb => { 
            const index = cb.getAttribute('data-index'); 
            db[index].pPrice = Number(pPrice); 
            db[index].pStart = pStart; 
            db[index].pEnd = pEnd; 
        });
        
        toggleSelectMode(); // вимикаємо режим вибору після успішного старту
        clearPromoForm(); 
        save();
    }

    window.cancelMassPromo = function() {
        const checkboxes = document.querySelectorAll('.select-item:checked');
        if (checkboxes.length === 0) return alert("Позначте товари галочками, щоб скинути з них акцію!");
        
        checkboxes.forEach(cb => { 
            const index = cb.getAttribute('data-index'); 
            db[index].pPrice = null; 
            db[index].pStart = null; 
            db[index].pEnd = null; 
        });
        
        toggleSelectMode();
        clearPromoForm(); 
        save();
    }

    function clearPromoForm() {
        document.getElementById('mass-promo-price').value = ''; document.getElementById('mass-promo-start').value = ''; document.getElementById('mass-promo-end').value = '';
        document.querySelectorAll('.select-item').forEach(cb => cb.checked = false);
        document.querySelectorAll('th class="checkbox-cell" input').forEach(cb => cb.checked = false);
    }

    window.toggleAll = function(cat, masterCb) { document.querySelectorAll(`.select-item.${cat}`).forEach(cb => cb.checked = masterCb.checked); }
    
    window.remove = function(index) {
        if(confirm(`Видалити товар "${db[index].name}" зі складу?`)) {
            db.splice(index, 1);
            save();
        }
    }
    
    function save() { localStorage.setItem('izismoke_v7_db', JSON.stringify(db)); render(); }
    
    checkAuth();
</script>
</body>
</html>
